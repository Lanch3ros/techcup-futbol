name: Deploy QA – TechCup Fútbol

on:
  workflow_run:
    workflows: ["CI – TechCup Fútbol"]
    branches: [develop]
    types: [completed]

jobs:
  deploy-qa:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Login al Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Deploy a Azure App Service QA
        uses: azure/webapps-deploy@v3
        with:
          app-name: techcup-backend-qa-1
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_QA }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/techcup-backend:${{ github.event.workflow_run.head_sha }}

      - name: Health check QA
        run: |
          echo "Esperando 90s para que el servicio reinicie..."
          sleep 90
          STATUS=$(curl --retry 5 --retry-delay 15 --retry-connrefused -L \
            -s -o /dev/null -w "%{http_code}" \
            https://techcup-backend-qa-1-gva9hqfdeqard9bf.centralus-01.azurewebsites.net/swagger-ui.html)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Health check fallido con status $STATUS"
            exit 1
          fi
          echo "Health check exitoso"
