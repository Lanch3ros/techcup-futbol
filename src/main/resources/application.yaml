logging:
  level:
    root: INFO
    com.example: INFO

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/techcup}
    username: ${DB_USERNAME:techcup}
    password: ${DB_PASSWORD:techcup}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  uploads:
    dir: uploads
